services:
  ai-memory:
    build:
      context: .
      dockerfile: Dockerfile
      target: ai-memory
    image: ai-memory-mcp:latest
    container_name: ai-memory-mcp
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ai_memory_data:/data
      - /opt/ai-memory/models:/models:ro
    environment:
      AI_MEMORY_HOST: "0.0.0.0"
      AI_MEMORY_PORT: "8000"
      AI_MEMORY_DB_PATH: "/data/ai_memory.db"
      AI_MEMORY_MODEL_PATH: "/models"
      HF_ENDPOINT: "https://hf-mirror.com"
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/mcp')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ai-memory-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: ai-memory-web
    image: ai-memory-mcp-web:latest
    container_name: ai-memory-mcp-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ai_memory_data:/data
    environment:
      AI_MEMORY_DB_PATH: "/data/ai_memory.db"
      AI_MEMORY_WEB_HOST: "0.0.0.0"
      AI_MEMORY_WEB_PORT: "8080"
    command: ["ai-memory-web"]
    depends_on:
      ai-memory:
        condition: service_started

volumes:
  ai_memory_data:
    driver: local
